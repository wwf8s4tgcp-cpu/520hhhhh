<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOVE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0d0008;height:100%;width:100%;overflow:hidden;font-family:Arial,sans-serif;-webkit-text-size-adjust:100%}
canvas{display:block;position:fixed;top:0;left:0;z-index:1;width:100%;height:100%}

#keepGoing{
  position:fixed;bottom:clamp(15px,5vw,30px);right:clamp(15px,5vw,30px);z-index:10;
  padding:clamp(8px,2.5vw,12px) clamp(16px,5vw,24px);
  border:2px solid #ff69b4;border-radius:25px;
  font-size:clamp(12px,3.5vw,15px);cursor:pointer;
  background:rgba(255,105,180,0.1);color:#ff69b4;
  font-family:Georgia,serif;letter-spacing:2px;transition:all .3s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation
}
#keepGoing:hover{background:#ff69b4;color:#0d0008}
#keepGoing:active{transform:scale(.95)}

#mainOv{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;
  background:rgba(0,0,0,.65);display:none;align-items:center;
  justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch
}

#dialog{
  background:linear-gradient(145deg,#fff0f5,#ffd6e0);border-radius:clamp(20px,5vw,30px);
  padding:clamp(30px,6vw,50px) clamp(25px,6vw,50px) clamp(25px,5vw,35px);
  max-width:500px;width:88vw;text-align:center;margin:auto
}
#dialog h2{font-size:clamp(18px,5vw,22px);color:#c4447a;margin-bottom:clamp(12px,3vw,16px)}
#dialog .msg{font-size:clamp(15px,4vw,17px);color:#a0355e;line-height:1.8;margin:clamp(14px,3vw,18px) 0 clamp(16px,4vw,22px)}
.db{display:flex;gap:clamp(10px,3vw,15px);margin-top:clamp(16px,4vw,20px)}
.db button{flex:1;padding:clamp(12px,3vw,14px) clamp(12px,3vw,16px);border-radius:50px;border:2px solid;font-size:clamp(12px,3.5vw,14px);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.db button:active{transform:scale(.96)}
.bl{background:linear-gradient(135deg,#ff8fab,#ff5e8e);color:#fff;border-color:#ff5e8e}
.bh{background:transparent;color:#c44a7a;border-color:#e89ab8}

#envSec{
  display:none;flex-direction:column;align-items:center;padding:clamp(15px,4vw,30px);
  width:100%;margin:auto
}
.envelope{position:relative;width:min(300px,80vw);height:auto;aspect-ratio:300/210;cursor:pointer;transition:opacity .6s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.env-body{
  width:100%;height:100%;background:#fce4ec;border-radius:clamp(8px,2vw,12px);
  display:flex;align-items:center;justify-content:center;position:relative;z-index:2;
  box-shadow:0 8px 40px rgba(255,80,140,.25)
}
.env-flap{
  position:absolute;top:0;left:0;width:100%;height:55%;
  background:#f0b8c8;clip-path:polygon(50% 100%,0 0,100% 0);
  transform-origin:top center;transition:transform .7s;z-index:3;backface-visibility:hidden
}
.envelope.open .env-flap{transform:rotateX(180deg)}
.env-seal{font-size:clamp(28px,10vw,36px)}
.env-hint{color:#fff;font-size:clamp(12px,3.5vw,14px);margin-top:clamp(14px,4vw,18px);opacity:.7;text-align:center}

.letter-scroll{width:min(560px,88vw);display:none;margin:auto}
.letter-paper{background:#fffaf5;border-radius:8px;padding:clamp(20px,5vw,45px) clamp(20px,5vw,45px);font-size:clamp(13px,3.5vw,15px);color:#5a1a2a;line-height:2.2}
.letter-paper p{text-indent:2em;margin-bottom:6px}
.lc{text-align:right;margin-top:clamp(14px,3vw,20px)}
.ls{font-size:clamp(15px,4vw,17px);font-weight:bold;color:#8a2a50;margin-top:4px}
.la{text-align:center;margin-top:clamp(12px,3vw,16px)}
.la button{padding:clamp(8px,2.5vw,12px) clamp(20px,6vw,30px);border:2px solid #ff69b4;border-radius:25px;font-size:clamp(12px,3.5vw,14px);cursor:pointer;background:transparent;color:#ff69b4;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.la button:active{background:#ff69b4;color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="keepGoing" onclick="showDialog()">✦ Keep Going ✦</button>

<div id="mainOv">
  <div id="dialog">
    <h2>💗 亲亲 💗</h2>
    <div class="msg">
      <span>您</span><span>有</span><span>一</span><span>封</span><span>信</span><span>待</span><span>接</span><span>收</span><span>~</span><br>
      <span style="font-size:clamp(12px,3.5vw,14px);color:#b85a80">请问要接收并打开吗？</span>
    </div>
    <div class="db">
      <button class="bl" onclick="openEnvelope()">💕 接收并打开（电子版）</button>
      <button class="bh" onclick="handwrite()">✍️ 对方对自己的称呼<br>手写版到微信</button>
    </div>
  </div>

  <div id="envSec">
    <div class="envelope" id="envelope">
      <div class="env-flap"></div>
      <div class="env-body"><div class="env-seal">💌</div></div>
    </div>
    <div class="env-hint">✨ 轻触信封，接收爱意 ✨</div>
    <div class="letter-scroll" id="letterScroll">
      <div class="letter-paper">
        <p style="text-align:left;text-indent:0;font-weight:bold">致xxx：</p>
        <p>祝贺语</p>
        <p>信件内容</p>
        <p>信件内容</p>
        <p>信件内容</p>
        <p>信件内容</p>
        <p>信件内容</p>
        <p style="text-align:center;font-weight:bold;color:#cc4477;font-size:clamp(15px,4vw,17px);margin-top:clamp(8px,2vw,10px)">再次祝贺语</p>
        <div class="lc">
          <div>称呼前缀</div>
          <div class="ls">对方对自己的称呼</div>
        </div>
      </div>
      <div class="la"><button onclick="closeAll()">💕 关闭信笺</button></div>
    </div>
  </div>
</div>

<script>
try {
const isMobile = /Mobi|Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth < 768;
const low = isMobile;
const SCALE = low ? 0.2 : 1;

const c=document.getElementById('c'),ctx=c.getContext('2d');
let w,h;
function resize(){
  w=c.width=window.innerWidth;
  h=c.height=window.innerHeight
}
resize();window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){setTimeout(resize,300)});

// LOVE Rain
const L='LOVE',dr=[];
const rainCount = Math.floor(60 * (low ? 0.25 : 1));
for(let i=rainCount;i--;)dr.push({l:Math.floor(Math.random()*4),x:Math.random()*w,y:-Math.random()*h,s:.5+Math.random()*3,sz:low?10+Math.random()*6:14+Math.random()*12,o:low?.4+.3: .3+Math.random()*.4,r:(Math.random()-.5)*.2,p:Math.random()*6.3,w:.2+Math.random()*.5});

// Spiral Tree
const tp=[];const SH=low?180:280,SB=low?60:100,ST=10;
if(!low){for(let s=3;s--;)for(let i=80;i--;){const t=i/80,a=t*6*6.2832+s/3*6.2832,r=t*SB;tp.push({x:Math.cos(a)*r,y:-SH/2+t*SH+ST,z:Math.sin(a)*r,h:t,oa:a})}
for(let i=180;i--;){const t=Math.random(),a=t*6*6.2832+Math.random()*6.2832,r=t*SB*(.6+Math.random()*.4);tp.push({x:Math.cos(a)*r,y:-SH/2+t*SH+ST,z:Math.sin(a)*r,h:t,oa:a})}}
const tk=[];
const tkCount1 = low ? 20 : 120;
const tkCount2 = low ? 20 : 100;
for(let i=tkCount1;i--;){const a=Math.random()*6.3,r=5+Math.random()*25,y=-SH/2+ST+SH;tk.push({x:Math.cos(a)*r*.5,y:y+Math.random()*12-4,z:Math.sin(a)*r*.5,ph:Math.random()*6.3,sp:.02+Math.random()*.03})}
for(let i=tkCount2;i--;){const a=Math.random()*6.3,r=2+Math.random()*15,y=-SH/2+ST+SH-Math.random()*35;tk.push({x:Math.cos(a)*r*.5,y,z:Math.sin(a)*r*.5,ph:Math.random()*6.3,sp:.01+Math.random()*.02})}
const hp=[];
function hx(t){return 16*Math.pow(Math.sin(t),3)}function hy(t){return 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)}
const heartCount = low ? 80 : 550;
for(let i=heartCount;i--;){const t=Math.random()*6.3,r=.5+Math.random()*.6,z=(Math.random()-.5)*4;const bx=hx(t)*r*2.5,by=-hy(t)*r*2.5;hp.push({x:bx,y:by-50,z})}
const sp=[];const sparkCount = low ? 10 : 50;
for(let i=sparkCount;i--;)sp.push({x:Math.random()*w,y:Math.random()*h,s:1+Math.random()*2,ph:Math.random()*6.3,sd:.002+Math.random()*.008});

let frame=0,ang=0;
let skipFrame = low ? 1 : 0;
function animate(){
  frame++;ang+=.006*(low?1.2:1);
  if(skipFrame) { skipFrame--; requestAnimationFrame(animate); return; }
  skipFrame = low ? 1 : 0;

  ctx.fillStyle='rgba(8,0,6,.18)';ctx.fillRect(0,0,w,h);
  for(const s of sp){const o=.2*(.5+.5*Math.sin(frame*s.sd+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,6.3);ctx.fillStyle=`rgba(255,182,193,${o})`;ctx.fill()}
  for(const d of dr){d.y+=d.s;d.x+=Math.sin(d.y*.008+d.p)*d.w;d.r+=.003;if(d.y>h+30){d.y=-30;d.x=Math.random()*w;d.l=Math.floor(Math.random()*4)}ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.r);ctx.font=d.sz+'px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=`rgba(255,105,180,${d.o})`;ctx.fillText(L[d.l],0,0);ctx.restore()}
  const cx=w/2,cy=h/2,cs=Math.cos(ang),sn=Math.sin(ang),f=650,spd=frame*.018;
  for(const p of tp){const r=Math.sqrt(p.x*p.x+p.z*p.z),na=p.oa+spd*(1-p.h*.5);const nx=Math.cos(na)*r,nz=Math.sin(na)*r;const x3=nx*cs+nz*sn,z3=-nx*sn+nz*cs,y3=p.y;const sc=f/(f+z3);ctx.beginPath();ctx.arc(cx+x3*sc,cy+y3*sc,2*sc,0,6.3);ctx.fillStyle='hsla(335,85%,60%,.7)';ctx.fill()}
  for(const p of tk){const rs=Math.sin(frame*p.sp+p.ph)*2;const x3=p.x*cs+p.z*sn,z3=-p.x*sn+p.z*cs,y3=p.y+rs;const sc=f/(f+z3);ctx.beginPath();ctx.arc(cx+x3*sc,cy+y3*sc,1.5*sc,0,6.3);ctx.fillStyle='hsla(335,80%,55%,.65)';ctx.fill()}
  const ht=-SH/2+ST-53;for(const p of hp){const x3=p.x*cs+p.z*sn,z3=-p.x*sn+p.z*cs,y3=p.y+ht;const sc=f/(f+z3);ctx.beginPath();ctx.arc(cx+x3*sc,cy+y3*sc,1.5*sc,0,6.3);ctx.fillStyle='hsla(345,90%,70%,.75)';ctx.fill()}
  ctx.font='14px Arial';ctx.textAlign='center';ctx.fillStyle='rgba(255,182,193,.25)';ctx.fillText('♥ L O V E ♥',cx,cy+175);
  requestAnimationFrame(animate)
}
animate();

// UI
const ov=document.getElementById('mainOv');
const di=document.getElementById('dialog');
const es=document.getElementById('envSec');
const env=document.getElementById('envelope');
const ls=document.getElementById('letterScroll');

function showDialog(){ov.style.display='flex';di.style.display='block';es.style.display='none'}
function openEnvelope(){
  di.style.display='none';
  es.style.display='flex';
  env.classList.remove('open');
  ls.style.display='none';
  env.style.display='';
}
function handwrite(){ov.style.display='none';alert('💌 请联系您的（对方对你的称呼）（微信号：）💌')}
function closeAll(){ov.style.display='none';env.classList.remove('open');ls.style.display='none';env.style.display=''}

env.addEventListener('click',function(){
  if(env.classList.contains('open'))return;
  env.classList.add('open');
  setTimeout(function(){ls.style.display='block';env.style.display='none'},700);
});

ov.addEventListener('click',function(e){if(e.target===ov)closeAll()});
}catch(e){document.body.innerHTML='<p style=color:#ff69b4;font-size:20px;padding:40px>Error: '+e.message+'</p>'}
</script>
</body>
</html>
